server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for any path. This app uses HashRouter,
    # so routes live in the URL hash and the server only ever sees "/", but
    # this keeps deep links / refreshes safe regardless.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively (Vite outputs content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the service worker or its registration shim — they must
    # update so new deployments are picked up on the next visit.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }

    # Don't cache the app shell or the PWA manifest
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
}
