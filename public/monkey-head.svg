<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d82f6"/>
      <stop offset="100%" stop-color="#5a52c4"/>
    </linearGradient>
  </defs>

  <!-- Rounded indigo backdrop. 112 ≈ Android adaptive-icon corner radius. -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Monkey head crop (head + ears, neutral expression).
       Coords lifted from MonkeyMascot.tsx; the transform centers the
       face at (256, 264) and scales so the visual fits the iOS maskable
       safe zone (central 80% circle). Edit shapes here, not in favicon. -->
  <g transform="translate(256 264) scale(4.4) translate(-50 -38)">
    <!-- Left ear -->
    <circle cx="28" cy="32" r="8" fill="#8B5E3C"/>
    <circle cx="28" cy="32" r="5" fill="#D4A76A"/>
    <!-- Right ear -->
    <circle cx="72" cy="32" r="8" fill="#8B5E3C"/>
    <circle cx="72" cy="32" r="5" fill="#D4A76A"/>

    <!-- Head -->
    <circle cx="50" cy="38" r="22" fill="#8B5E3C"/>
    <!-- Face -->
    <circle cx="50" cy="40" r="16" fill="#D4A76A"/>

    <!-- Eyes (neutral, with shine) -->
    <circle cx="42" cy="36" r="3.5" fill="#3D2B1F"/>
    <circle cx="58" cy="36" r="3.5" fill="#3D2B1F"/>
    <circle cx="43.5" cy="34.5" r="1.2" fill="white"/>
    <circle cx="59.5" cy="34.5" r="1.2" fill="white"/>

    <!-- Nose -->
    <ellipse cx="50" cy="41" rx="3" ry="2" fill="#C4956A"/>

    <!-- Gentle smile -->
    <path d="M42 44 Q50 50 58 44" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
</svg>
